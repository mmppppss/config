# #######################################################################################
# HYPRLAND CONFIG - GRUVBOX THEME
# Adaptado de bspwm
# #######################################################################################

################
### MONITORS ###
################

monitor=eDP-1,1366x768@60.02,0x0,1.00,bitdepth,10,cm,hdredid,sdrbrightness,1.30,vrr,2

###################
### MY PROGRAMAS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun

#################
### AUTOSTART ###
#################

# Polkit agent
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent &

# Notifications
exec-once = dunst &

# Compositor
exec-once = picom &

# Wallpaper
exec-once = hyprpaper &

# Waybar
exec-once = waybar &

# Display management (autorandr)
exec-once = autorandr -c &
exec-once = hyprsunset
# Network applet
exec-once = nm-applet &

# Clipboard
exec-once = xclip -selection clipboard &

# Disable screen blanking
exec-once = xset s off &
exec-once = xset -dpms &

# Polkit gnome (backup)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &

#############################
### VARIABLES GRUVBOX ###
#############################

$bg0_h = #1d2021
$bg0 = #282828
$bg1 = #3c3836
$bg2 = #504945
$bg3 = #665c54
$bg4 = #7c6f64

$fg0 = #fbf1c7
$fg1 = #ebdbb2
$fg2 = #d5c4a1
$fg3 = #bdae93
$fg4 = #a89984

$red = #cc241d
$green = #98971a
$yellow = #d79921
$blue = #458588
$purple = #b16286
$aqua = #689d6a
$orange = #d65d0e
$gray = #928374

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

###################
### LOOK AND FEEL ###
###################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(d7992188)
    col.inactive_border = rgba(50494588)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    shadow {
        enabled = true
        range = 4
        render_power = 2
        color = rgba(1a1a1aee)
    }
    
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes
    
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5, easeOutQuint
    animation = windows, 1, 5, easeOutQuint
    animation = windowsIn, 1, 4, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.5, linear, popin 87%
    animation = fadeIn, 1, 1.7, almostLinear
    animation = fadeOut, 1, 1.5, almostLinear
    animation = fade, 1, 3, quick
    animation = layers, 1, 4, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = workspaces, 1, 2, almostLinear, fade
}

dwindle {
    #pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = latam
    follow_mouse = 1
    sensitivity = 0
    
    touchpad {
        natural_scroll = false
        tap-to-click = true
        tap-and-drag = true
        tap_button_map = lrm
        disable_while_typing = true
    }
}

gesture = 3, horizontal, workspace

###############
### KEYBINDS ###
###############

$mainMod = SUPER

# Terminal
bind = $mainMod, Return, exec, $terminal

# Cerrar ventana
bind = $mainMod SHIFT, Q, killactive,

# Gestores de archivos
bind = $mainMod SHIFT, T, exec, thunar
bind = $mainMod SHIFT, K, exec, caja

# Navegadores / Apps
bind = $mainMod SHIFT, F, exec, firefox
bind = $mainMod SHIFT, O, exec, opera
bind = $mainMod SHIFT, M, exec, thunderbird

# Rofi
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, Tab, exec, rofi -show window

# Scripts personalizados
# bind = $mainMod, Insert, exec, bash ~/.config/scripts/setWall.sh

# alternar fullscreen
bind = $mainMod, space, fullscreen, 0

# alternar flotante
bind = $mainMod SHIFT, space, togglefloating

# Foco direccional (flechas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mover ventana en dirección
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Layouts
bind = $mainMod, M, exec, hyprctl keyword general layout "dwindle"
# esta duplicado con el mail xd borrar el mail talvez
bind = $mainMod SHIFT, M, exec, hyprctl keyword general layout "master"

# Workspaces - ir
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Workspaces - mover ventana
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mover / redimensionar ventanas
# bindm = $mainMod, mouse:272, movewindow
# bindm = $mainMod, mouse:273, resizewindow

# Sistema - recargar Hyprland
bind = $mainMod, Escape, exec, hyprctl reload

# Reiniciar Hyprland
bind = $mainMod SHIFT, R, exec, hyprctl kill

# Powermenu
bind = $mainMod SHIFT, Home, exec, sh ~/.config/rofi/applets/applets/powermenu.sh

# Suspender
bind = $mainMod SHIFT, End, exec, systemctl suspend

# Apagar
#bind = $mainMod SHIFT, Delete, exec, sh ~/.config/rofi/applets/applets/archmenu.sh

# Volumen
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brillo (teclas F3/F4)
bind = , XF86MonBrightnessUp, exec, brightnessctl s +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Multimedia
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous

# Screenshots
bind = , Print, exec, hyprshot -m output -o ~/Pictures
bind = SHIFT, Print, exec, hyprshot -m region -o ~/Pictures

##############################
### WINDOWS AND WORKSPACES ###
##############################
